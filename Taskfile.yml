version: '3'

tasks:
  build-docker:
    desc: Build Docker image
    cmds:
      - docker build -t ronan4000/invrt .

  # PHP/PHPUnit test scripts
  test:
    desc: Run all tests and quality checks
    cmds:
      - task: test:php
      - task: test:phpstan
      - task: test:modernize
      - task: test:lint
      - task: test:security

  test:php:
    desc: Run all tests with PHPUnit
    dir: /tmp
    cmds:
      - php {{.TASKFILE_DIR}}/vendor/bin/phpunit --testdox {{.TASKFILE_DIR}}/tests

  test:unit:
    desc: Run unit tests only
    cmds:
      - php {{.TASKFILE_DIR}}/vendor/bin/phpunit --testdox {{.TASKFILE_DIR}}/tests/Unit

  test:e2e:
    desc: Run E2E tests only
    dir: /tmp
    cmds:
      - php {{.TASKFILE_DIR}}/vendor/bin/phpunit --testdox {{.TASKFILE_DIR}}/tests/E2E

  test:coverage:
    desc: Run tests with code coverage report
    cmds:
      - sh -c 'XDEBUG_MODE=coverage php vendor/bin/phpunit --coverage-text /workspaces/invrt'

  test:coverage:
    desc: Generate HTML code coverage report
    cmds:
      - sh -c 'XDEBUG_MODE=coverage php vendor/bin/phpunit --coverage-html=tooling/coverage/ /workspaces/invrt'


  test:modernize:
    desc: Dry-run Rector code modernization
    cmds:
      - vendor/bin/rector process src --config=tooling/rector.php --dry-run

  fix:modernize:
    desc: Run Rector code modernization (applies safe rules)
    cmds:
      - vendor/bin/rector process src --config=tooling/rector.php

  test:phpstan:
    desc: Run PHPStan static analysis
    cmds:
      - vendor/bin/phpstan analyse --configuration=tooling/phpstan.neon

  baseline:phpstan:
    desc: Generate PHPStan baseline for current violations
    cmds:
      - vendor/bin/phpstan analyse --generate-baseline --allow-empty-baseline --configuration=tooling/phpstan.neon

  test:lint:
    desc: Check code style with PHP CS Fixer
    cmds:
      - php ./vendor/bin/php-cs-fixer check --diff --config=tooling/.php-cs-fixer.php

  fix:lint:
    desc: Auto-fix code style with PHP CS Fixer
    cmds:
      - php ./vendor/bin/php-cs-fixer fix --config=tooling/.php-cs-fixer.php

  test:security:
    desc: Check for security vulnerabilities in dependencies
    cmds:
      - composer audit

  # Combined check task
  check:
    desc: Run all code quality checks (lint, analyze, security)
    cmds:
      - task: check:lint
      - task: check:stan
      - task: check:security

  fix:
    desc: Run all code fixes (modernize, lint)
    cmds:
      - task: fix:modernize
      - task: fix:lint

  # Utility tasks
  help:
    desc: Show all available tasks
    cmds:
      - task -l
