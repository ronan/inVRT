version: '3'

vars:
  VERSION:
    sh: node -p "require('./package.json').version"

tasks:

  install:playwright:
    desc: Install Playwright dependencies
    cmds:
      - npx playwright install --with-deps

  install:dev:
    desc: Install development dependencies
    cmds:
      - sudo composer install
      - npm install

  install:dist:
    desc: Install production dependencies
    cmds:
      - composer install --no-dev --prefer-dist --optimize-autoloader
      - npm install

  test:
    desc: Run all tests and quality checks
    deps: [fix, test:phpstan, test:php]

  livecode:
    desc: Run the live coding session
    watch: true
    cmds:
      - inotifywait -e modify -m tooling/templates | while read path action file; do echo "$action:$file. Rebuilding..."; task build:templates --force; done

  watch:
    desc: Watch for file changes and rerun tasks
    watch: true
    deps: [fix:lint, test:php:unit, build:templates]
 
  fix:
    desc: Run all code fixes (modernize, lint)
    deps: [fix:modernize, fix:lint]

  build:
    desc: Build the project
    cmds:
      - task: fix
      - task: test:security
      - task: build:docker

  build:docker:
    desc: Build Docker image
    aliases: [docker:build]
    deps: [install:dist]
    cmds:
      - docker build --no-cache --progress=plain --build-arg WITH_PLAYWRIGHT=true -t ronan4000/invrt:{{.VERSION}} -t ronan4000/invrt:latest .

  publish:docker:
    desc: Publish Docker image to Docker Hub
    aliases: [docker:publish]
    deps: [build:docker]
    cmds:
      - bash ./tooling/scripts/publish-docker.sh

  version:show:
    desc: Show the current project version
    cmds:
      - echo {{.VERSION}}

  version:bump:
    desc: Bump patch version
    cmds:
      - npx release-it patch --ci --config tooling/.release-it.json

  release:publish:
    desc: Publish Docker image and ddev addon for current version
    cmds:
      - task publish:docker
      - task publish:ddev-addon

  build:templates:
    desc: Generate PHP files from Handlebars templates and the config schema
    sources:
      - 'tooling/templates/*'
      - 'docs/config.schema.yaml'
    cmds:
      - node tooling/scripts/build-config-definition.mjs

  test:php:
    desc: Run all tests with PHPUnit
    dir: /tmp
    cmds:
      - php {{.TASKFILE_DIR}}/vendor/bin/phpunit --configuration={{.TASKFILE_DIR}}/tooling/phpunit.xml --testdox --stop-on-failure {{.TASKFILE_DIR}}/tests {{.CLI_ARGS}}
    sources:
      - 'src/**/*.php'
      - 'tests/**/*.php'

  test:php:unit:
    desc: Run unit tests with PHPUnit
    dir: /tmp
    cmds:
      - php {{.TASKFILE_DIR}}/vendor/bin/phpunit --configuration={{.TASKFILE_DIR}}/tooling/phpunit.xml --testdox {{.TASKFILE_DIR}}/tests/Unit {{.CLI_ARGS}}
    sources:
      - 'src/**/*.php'
      - 'tests/**/*.php'
    
  test:php:e2e:
    desc: Run integration tests with PHPUnit
    dir: /tmp
    cmds:
      - php {{.TASKFILE_DIR}}/vendor/bin/phpunit --configuration={{.TASKFILE_DIR}}/tooling/phpunit.xml --testdox {{.TASKFILE_DIR}}/tests/e2e {{.CLI_ARGS}}
    sources:
      - 'src/**/*.php'
      - 'tests/**/*.php'

  test:coverage:
    desc: Run tests with code coverage report
    cmds:
      - XDEBUG_MODE=coverage php vendor/bin/phpunit --configuration=tooling/phpunit.xml --coverage-text --coverage-html=reports/coverage/

  test:modernize:
    desc: Dry-run Rector code modernization
    cmds:
      - vendor/bin/rector process src --config=tooling/rector.php --dry-run

  fix:modernize:
    desc: Run Rector code modernization (applies safe rules)
    cmds:
      - vendor/bin/rector process src --config=tooling/rector.php

  test:phpstan:
    desc: Run PHPStan static analysis
    cmds:
      - vendor/bin/phpstan analyse --configuration=tooling/phpstan.neon

  baseline:phpstan:
    desc: Generate PHPStan baseline for current violations
    cmds:
      - vendor/bin/phpstan analyse --generate-baseline --allow-empty-baseline --configuration=tooling/phpstan.neon

  test:lint:
    desc: Check code style with PHP CS Fixer
    cmds:
      - php ./vendor/bin/php-cs-fixer check --diff --config=tooling/.php-cs-fixer.php

  fix:lint:
    desc: Auto-fix code style with PHP CS Fixer
    aliases: [lint]
    sources:
      - 'src/**/*.php'
      - 'tests/**/*.php'
    cmds:
      - php ./vendor/bin/php-cs-fixer fix --config=tooling/.php-cs-fixer.php

  test:security:
    desc: Check for security vulnerabilities in dependencies
    cmds:
      - composer audit
      - npm audit

  test:schema:
    desc: Validate config JSON Schema and example config file
    cmds:
      - node tooling/scripts/validate-schema.mjs

  fix:repo:
    desc: Run tasks to clean up the repository structure
    cmds:
      - chmod a+x tooling/scripts/*

  publish:ddev-addon:
    desc: Publish the invrt-ddev addon to GitHub
    aliases: [ddev-addon:publish]
    cmds:
      - bash ./tooling/scripts/publish-ddev-addon.sh

  help:
    desc: Show all available tasks
    cmds:
      - task -l
