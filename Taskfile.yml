version: '3'

tasks:
  build-docker:
    desc: Build Docker image
    cmds:
      - docker build -t ronan4000/invrt .

  # PHP/PHPUnit test scripts
  test:
    desc: Run all tests with PHPUnit
    cmds:
      - ./vendor/bin/phpunit --testdox

  test:unit:
    desc: Run unit tests only
    cmds:
      - ./vendor/bin/phpunit --testdox tests/Unit

  test:e2e:
    desc: Run E2E tests only
    cmds:
      - ./vendor/bin/phpunit --testdox tests/E2E

  test:coverage:
    desc: Run tests with code coverage report
    cmds:
      - sh -c 'XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-text'

  test:coverage-html:
    desc: Generate HTML code coverage report
    cmds:
      - sh -c 'XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-html=coverage/'

  # PHPStan analysis
  analyze:
    desc: Run PHPStan static analysis
    cmds:
      - ./vendor/bin/phpstan analyse

  analyze:baseline:
    desc: Generate PHPStan baseline for current violations
    cmds:
      - ./vendor/bin/phpstan analyse --generate-baseline --allow-empty-baseline

  # Utility tasks
  help:
    desc: Show all available tasks
    cmds:
      - task -l
