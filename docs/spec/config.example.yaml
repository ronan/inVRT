project:
  name: My inVRT Project
  id: xkqjmxvte
  viewport_width: 1920
  viewport_height: 1080
  max_crawl_depth: 3
  max_pages: 100
  login_url: user/login
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36

  directory: 'INVRT_CWD/.invrt'
  config_file: 'INVRT_DIRECTORY/config.yaml'
  scripts_dir: 'INVRT_DIRECTORY/scripts'

  environment_dir: 'INVRT_DIRECTORY/data/INVRT_ENVIRONMENT'
  profile_dir: 'INVRT_DIRECTORY/data/INVRT_ENVIRONMENT/INVRT_PROFILE'
  device_dir: 'INVRT_DIRECTORY/data/INVRT_ENVIRONMENT/INVRT_PROFILE/INVRT_DEVICE'

  data_dir: 'INVRT_DEVICE_DIR'
  capture_dir: 'INVRT_DEVICE_DIR'

  crawl_dir: 'INVRT_PROFILE_DIR'
  cookies_file: 'INVRT_CRAWL_DIR/cookies'
  crawl_log: 'INVRT_CRAWL_DIR/logs/crawl.log'
  clone_dir: 'INVRT_CRAWL_DIR/clone'
  crawl_file: 'INVRT_CRAWL_DIR/crawled_urls.txt'
  exclude_file: 'INVRT_CRAWL_DIR/exclude_paths.txt'

environments:
  local:
    name: Local
    url: http://localhost

  dev:
    name: Development
    url: https://dev.example.com

  prod:
    name: Production
    url: https://prod.example.com

profiles:
  anonymous:
    name: Anonymous Visitor Profile

  admin:
    name: Admin Profile
    username: admin
    password: password123
    login_url: user/login

devices:
  desktop:
    name: Desktop Viewport
    viewport_width: 1920
    viewport_height: 1080

  mobile:
    name: Mobile Viewport
    viewport_width: 375
    viewport_height: 667
