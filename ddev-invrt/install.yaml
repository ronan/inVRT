name: invrt

project_files:
  - invrt-build/
  - docker-compose.invrt.yaml
  - commands/invrt/invrt
  - commands/host/invrt-autoconfigure
  - commands/host/invrt-baseline
  - commands/host/invrt-test
  - commands/host/invrt-approve
  - commands/host/invrt-setup
  - commands/host/invrt-teardown

ddev_version_constraint: '>= v1.24.3'

post_install_actions:
 - test -d ./.invrt || mkdir -p ./.invrt
 - ddev invrt-autoconfigure
 - ddev invrt-baseline

removal_actions:
 - rm -rf ./.invrt
