version: '3'

vars:
  VERSION:
    sh: node -p "require('./package.json').version"

tasks:

  install:ddev:
    desc: Install ddev
    sudo: false
    cmds:
      - tooling/scripts/install-ddev.sh

  install:bats:
    desc: Install BATS test dependencies
    cmds:
      - npm install --save-dev bats

  install:playwright:
    desc: Install Playwright dependencies
    cmds:
      - npx playwright install --with-deps

  install:dev:
    desc: Install development dependencies
    cmds:
      - sudo composer install
      - npm install

  install:dist:
    desc: Install production dependencies
    cmds:
      - composer install --no-dev --prefer-dist --optimize-autoloader
      - npm install --omit=dev

  start:playwright:
    desc: Start Playwright test runner
    cmds:
      - docker run -p 3000:3000 --rm --init -it --workdir /home/pwuser --user pwuser mcr.microsoft.com/playwright:v1.59.1-noble /bin/sh -c "npx -y playwright@1.59.1 run-server --port 3000 --host 0.0.0.0"

  stop:playwright:
    desc: Stop Playwright test runner
    cmds:
      - docker ps -q --filter "ancestor=mcr.microsoft.com/playwright:v1.59.1-noble" | xargs -r docker stop

  test:
    desc: Run all tests and quality checks
    deps: [fix, test:bats]

  livecode:
    desc: Run the live coding session
    watch: true
    cmds:
      - inotifywait -e modify -m tooling/templates | while read path action file; do echo "$action:$file. Rebuilding..."; task build:templates --force; done

  watch:
    desc: Watch for file changes and rerun tasks
    watch: true
    deps: [fix:lint, test:bats, build:templates]
 
  fix:
    desc: Run all code fixes (lint)
    deps: [fix:lint]

  build:
    desc: Build the project
    cmds:
      - task: fix
      - task: test:security
      - task: build:docker

  build:docker:
    desc: Build Docker image
    aliases: [docker:build]
    sources:
      - 'VERSION.txt'
      - 'src/**/*'
      - 'Dockerfile'
      - '.dockerignore'
    cmds:
      - docker build --progress=plain -t ronan4000/invrt:{{.VERSION}} -t ronan4000/invrt:latest .

  publish:
    desc: Publish Docker image and ddev addon for current version
    sources:
      - 'VERSION.txt'
    cmds:
      - task publish:docker
      - task publish:ddev-addon

  publish:docker:
    desc: Publish Docker image to Docker Hub
    aliases: [docker:publish]
    sources:
      - 'VERSION.txt'
    cmds:
      - bash ./tooling/scripts/publish-docker.sh

  publish:ddev-addon:
    desc: Publish the invrt-ddev addon to GitHub
    aliases: [ddev-addon:publish]
    cmds:
      - bash ./tooling/scripts/publish-ddev-addon.sh


  version:show:
    desc: Show the current project version
    cmds:
      - echo {{.VERSION}}

  version:bump:
    desc: Bump patch version
    cmds:
      - npx release-it patch --ci --config tooling/config/.release-it.json
  
  version:bump:minor:
    desc: Bump minor version
    cmds:
      - npx release-it minor --ci --config tooling/config/.release-it.json

  version:bump:major:
    desc: Bump major version
    cmds:
      - npx release-it major --ci --config tooling/config/.release-it.json

  build:templates:
    desc: Generate JavaScript files from Handlebars templates and the application specification
    sources:
      - 'tooling/templates/*'
      - 'docs/spec/Application.yaml'
    cmds:
      - node tooling/scripts/build-app.mjs

  test:bats:
    desc: Run BATS CLI tests
    cmds:
      - node_modules/.bin/bats tests/bats/

  test:bats:docker:
    desc: Run BATS CLI tests in the Docker test stage
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/scratch/tests
      - docker build --target test -t invrt:test .
      - docker run --rm -v {{.TASKFILE_DIR}}/scratch/tests:/scratch/tests invrt:test

  test:lint:
    desc: Check code style with PHP CS Fixer
    cmds:
      - php ./vendor/bin/php-cs-fixer check --diff --config=tooling/config/.php-cs-fixer.php

  fix:lint:
    desc: Auto-fix code style with PHP CS Fixer
    aliases: [lint]
    sources:
      - 'src/core/**/*.php'
      - 'src/cli/**/*.php'
      - 'tests/**/*.php'
    cmds:
      - php ./vendor/bin/php-cs-fixer fix --config=tooling/config/.php-cs-fixer.php

  test:security:
    desc: Check for security vulnerabilities in dependencies
    cmds:
      - composer audit
      - npm audit

  test:schema:
    desc: Validate config JSON Schema and example config file
    cmds:
      - node tooling/scripts/validate-schema.mjs

  fix:repo:
    desc: Run tasks to clean up the repository structure
    cmds:
      - chmod a+x tooling/scripts/*

  help:
    desc: Show all available tasks
    cmds:
      - task -l
